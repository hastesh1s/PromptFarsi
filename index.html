<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>پرامپت فارسی | مرجع پرامپت هوش مصنوعی، ChatGPT و Midjourney</title>

<meta name="description" content="بهترین و کامل‌ترین آرشیو پرامپت‌های فارسی برای ChatGPT، Gemini، Claude، Midjourney، Flux و سایر ابزارهای هوش مصنوعی.">
<meta name="keywords" content="پرامپت فارسی, پرامپت هوش مصنوعی, ChatGPT, Midjourney, Gemini, Claude, Flux, PromptFarsi">
<meta name="robots" content="index,follow">
<meta name="theme-color" content="#050505">

<meta property="og:title" content="پرامپت فارسی | مرجع هوش مصنوعی">
<meta property="og:description" content="آرشیو حرفه‌ای پرامپت‌های فارسی برای ابزارهای هوش مصنوعی">
<meta property="og:type" content="website">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="favicon.png?v=999">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Vazirmatn',sans-serif;
}

body{
background:#050505;
color:white;
padding:20px;
}

/* HEADER */
.header{
text-align:center;
margin-bottom:35px;
}

.logo{
font-size:3.4rem;
font-weight:900;
background:linear-gradient(135deg,#fff,#aaa);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
text-shadow:0 0 30px rgba(255,255,255,0.1);
}

.header p{
color:#aaa;
margin-top:8px;
font-size:14px;
}

/* SEARCH */
.search-box{
margin:20px auto;
max-width:500px;
display:flex;
}

.search-box input{
width:100%;
padding:12px;
border-radius:12px;
border:1px solid #333;
background:#111;
color:white;
outline:none;
}

/* GRID */
.gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
margin-top:25px;
}

.card{
background:#0f0f0f;
border:1px solid #222;
border-radius:16px;
overflow:hidden;
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:translateY(-6px);
border-color:#555;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card-title{
padding:12px;
font-size:14px;
color:#ddd;
}

/* MODAL */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.85);
display:none;
justify-content:center;
align-items:center;
padding:20px;
z-index:999;
}

.modal-content{
background:#111;
width:100%;
max-width:700px;
border-radius:18px;
overflow:hidden;
}

.modal-content img{
width:100%;
max-height:400px;
object-fit:cover;
}

.prompt{
padding:15px;
white-space:pre-wrap;
line-height:1.7;
color:#ddd;
}

.actions{
display:flex;
gap:10px;
padding:10px;
}

button{
flex:1;
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
background:#222;
color:white;
transition:0.3s;
}

button:hover{
background:#333;
}

.close{
text-align:center;
padding:12px;
background:#1a1a1a;
cursor:pointer;
}

.close:hover{
background:#2a2a2a;
}

</style>
</head>

<body>

<div class="header">
<h1 class="logo">پرامپت فارسی</h1>
<p>مرجع حرفه‌ای پرامپت‌های هوش مصنوعی</p>
</div>

<div class="search-box">
<input type="text" id="search" placeholder="جستجوی پرامپت...">
</div>

<div class="gallery" id="gallery"></div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<img id="modalImage">
<div class="prompt" id="modalPrompt"></div>

<div class="actions">
<button onclick="copyPrompt()">📋 کپی پرامپت</button>
</div>

<div class="close" onclick="closeModal()">بستن</div>
</div>
</div>

<script>

let data = [
{
image:"https://i.imgur.com/R6qSBHK.jpeg",
title:"واقع گرایانه",
prompt:`A low-angle close-up selfie captured outdoors under strong natural sunlight.
The subject looks directly into the camera with a candid and authentic expression.
Bright sunlight creates realistic shadows across the face while preserving skin texture, pores, subtle imperfections, and natural highlights.
The background contains blue sky, ocean, coastline, or open natural scenery softly visible behind the subject.
Captured with a modern smartphone using a wide-angle lens. Ultra-photorealistic photography. Natural color science. Realistic skin response to sunlight.
Sharp focus. Authentic environmental lighting. No beauty filters.
No skin smoothing. No CGI appearance. No AI-generated artifacts.
The overall mood is vibrant, energetic, spontaneous, confident, and vacation-oriented.`
},
{
image:"blob:https://imgur.com/dd0e4d35-0e53-40b2-8d3f-b98923e083a0",
title:"پوستر فوتبالی
  ابتدای فایل را مدنظر خود تغیر دهید ",
prompt:`@PLAYER = “[Farshad Farahani]”
@CLUB = “[Real Madrid]” @NUMBER = “[7]”
OPTIONAL: @POSITION = “[Winger]” @HEADLINE = “[Legacy Never Ends]” 
@LEAGUE = “[UEFA Champions League]” 3:4 Aspect Ratio is a MUST! Create an ultra-premium 
cinematic CLUB FOOTBALL editorial poster in vertical 3:4 aspect ratio. MAIN SUBJECT:
A hyper-realistic stylized portrait of @PLAYER sitting on a large minimalist geometric cube displaying the number
@NUMBER on the front face. The player sits centered symmetrically: elbows resting naturally on thighs hands 
clasped together confident focused expression looking slightly upward toward the light calm warrior mentality powerful
silent energy premium athletic posture The player wears the official @CLUB latest home/away kit. IF A JERSEY REFERENCE IMAGE 
IS PROVIDED: use the uploaded jersey EXACTLY as reference preserve authentic colors preserve collar design preserve sleeve trim preserve
sponsor/logo placement preserve club crest placement preserve league patches preserve typography style preserve number styling preserve fabric
texture preserve stitching details do NOT redesign the jersey
do NOT simplify the jersey maintain realistic fabric folds and
compression maintain authentic football kit realism STYLE: Minimal
luxury editorial mixed with cinematic football illustration realism
. The artwork should feel like: elite UEFA campaign art premium football
magazine cover luxury Nike / Adidas / Puma campaign collectible sports
poster textured digital illustration cinematic realism subtle hand-painted
finish ultra-clean composition sophisticated geometric layout COMPOSITION:
centered perfectly symmetrical layout player occupies most of the frame
vertically large oversized faded @NUMBER behind the player additional
large @NUMBER integrated into the cube elegant negative space modern
grid-system inspired composition thin technical line elements subtle
alignment guides minimal geometric accents editorial sports design
language BACKGROUND: Warm off-white / ivory textured paper background
with: subtle grain soft paper texture faint watercolor shading elegant
negative space minimal geometric accents subtle halftone textures faint
architectural lines soft ambient gradients collectible poster finish CLUB
VISUAL LANGUAGE: Automatically generate elegant visual accents inspired by
@CLUB: official club color palette subtle stadium-inspired geometry minimal 
club identity graphics premium football branding aesthetics modern UEFA campaign
language thin editorial line systems luxury sportswear campaign energy elegant
color bars inspired by club colors TYPOGRAPHY: Top-left corner: “@LEAGUE 2026”
or “EUROPEAN NIGHTS” or “CLUB WORLD TOUR” with elegant football branding aesthetics
. Headline system: If @HEADLINE is empty, generate a unique cinematic headline
automatically inspired by: club legacy football greatness ambition pressure
glory dynasty leadership destiny rivalry championship mentality Examples: 
“GLORY DEMANDS MORE” “BORN FOR THE BIG STAGE” “LEGACY NEVER RESTS” “KINGS OF
EUROPE” “DESTINY WEARS THIS CREST” “THE NIGHT BELONGS TO LEGENDS” “PRESSURE
CREATES ICONS” PLAYER INFO SYSTEM: Include elegant editorial typography blocks
with: @PLAYER @POSITION @CLUB optional captain/vice-captain role subtle signature
aesthetic premium sports typography hierarchy VISUAL QUALITY: ultra detailed skin
texture realistic anatomy and muscles cinematic facial lighting realistic football
boots realistic socks and kit wrinkles premium editorial contrast subtle warm highlight
s elegant shadows realistic fabric compression museum-poster finish highly refined
composition extremely clean edges ultra premium football campaign quality LIGHTING:
Soft cinematic studio lighting: warm overhead key light subtle rim light controlled soft
shadows realistic skin reflections elegant ambient illumination premium sports editorial 
lighting MOOD: iconic ambitious timeless elite athlete mentality`
},
];

let currentPrompt="";

// render
function render(list){
const gallery=document.getElementById("gallery");
gallery.innerHTML="";

list.forEach((item,index)=>{
gallery.innerHTML+=`
<div class="card" onclick="openModal(${index})">
<img src="${item.image}">
<div class="card-title">${item.title}</div>
</div>`;
});
}

render(data);

// modal
function openModal(i){
document.getElementById("modal").style.display="flex";
document.getElementById("modalImage").src=data[i].image;
document.getElementById("modalPrompt").innerText=data[i].prompt;
currentPrompt=data[i].prompt;
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

// copy
function copyPrompt(){
navigator.clipboard.writeText(currentPrompt);
alert("کپی شد ✅");
}

// search
document.getElementById("search").addEventListener("input",function(e){
let value=e.target.value.toLowerCase();
let filtered=data.filter(item=>item.title.toLowerCase().includes(value));
render(filtered);
});

</script>

</body>
</html>
