<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt Gallery</title>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;900&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
background:#050505;
color:white;
padding:20px;
}

.header{
text-align:center;
margin-bottom:40px;
}

.logo{
font-size:3rem;
font-weight:900;
letter-spacing:-2px;
background:linear-gradient(90deg,#ffffff,#cfcfcf);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
margin-bottom:10px;
}

.header p{
color:#8a8a8a;
font-size:1rem;
}
.gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
gap:20px;
}

.card{
background:#0e0e0e;
border:1px solid #222;
border-radius:16px;
overflow:hidden;
cursor:pointer;
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
border-color:#444;
}

.card img{
width:100%;
height:220px;
object-fit:cover;
display:block;
}

.card-title{
padding:15px;
font-size:15px;
color:#ddd;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.8);
display:none;
justify-content:center;
align-items:center;
padding:20px;
z-index:999;
}

.modal-content{
background:#111;
max-width:700px;
width:100%;
border-radius:20px;
overflow:hidden;
}

.modal-content img{
width:100%;
max-height:400px;
object-fit:cover;
}

.prompt{
padding:20px;
line-height:1.8;
white-space:pre-wrap;
}

.close{
padding:15px;
text-align:center;
background:#1b1b1b;
cursor:pointer;
}

.close:hover{
background:#292929;
}

@media(max-width:600px){
.card img{
height:180px;
}
}
</style>
</head>

<body>

<div class="header">
<h1 class="logo">پرامپت فارسی</h1>
<p>بزرگ‌ترین آرشیو پرامپت‌های فارسی هوش مصنوعی</p>
</div>

<div class="gallery" id="gallery"></div>

<div class="modal" id="modal">
<div class="modal-content">
<img id="modalImage">
<div class="prompt" id="modalPrompt"></div>
<div class="close" onclick="closeModal()">
بستن
</div>
</div>
</div>

<script>

const galleryItems = [

{
image:"https://picsum.photos/600/400?1",
title:"بارسلونا",
prompt:`Create a realistic football poster of a Barcelona player,
cinematic lighting,
8K quality,
ultra detailed.`
},

{
image:"https://picsum.photos/600/400?2",
title:"سایبرپانک",
prompt:`Cyberpunk city at night,
neon lights,
rain,
ultra realistic,
high detail.`
}

];

// ساخت گالری
const gallery=document.getElementById("gallery");

galleryItems.forEach(item=>{

gallery.innerHTML+=`
<div class="card"
onclick='openModal(${JSON.stringify(item)})'>

<img src="${item.image}">
<div class="card-title">${item.title}</div>

</div>
`;

});

function openModal(item){

document.getElementById("modal").style.display="flex";
document.getElementById("modalImage").src=item.image;
document.getElementById("modalPrompt").innerText=item.prompt;

}

function closeModal(){
document.getElementById("modal").style.display="none";
}

</script>

</body>
</html>
