ChatGPT یک مدل زبان بزرگ (Large Language Model) است که توسط شرکت OpenAI توسعه داده شده و بر پایه معماری Transformer ساخته شده است. این مدل توانایی درک متن، تولید پاسخ‌های طبیعی، حل مسائل و کمک به آموزش و تولید محتوا را دارد.

1. مقدمه

با پیشرفت فناوری‌های هوش مصنوعی، مدل‌های زبانی بزرگ (LLM) به یکی از مهم‌ترین دستاوردهای این حوزه تبدیل شده‌اند. ChatGPT یکی از پیشرفته‌ترین نمونه‌های این مدل‌هاست که می‌تواند با کاربران به شکل طبیعی گفتگو کند.

این مدل بر پایه شبکه‌های عصبی و یادگیری عمیق ساخته شده و توانایی پردازش زبان انسانی را دارد.

2. معماری و نحوه کار

ChatGPT بر اساس معماری Transformer ساخته شده است. این معماری از مکانیزم Attention برای درک ارتباط بین کلمات استفاده می‌کند.

ویژگی‌های مهم:

پردازش متنی بسیار سریع
درک ارتباط معنایی جملات
تولید پاسخ‌های طبیعی
بهینه‌سازی شده برای گفتگو
3. آموزش مدل

ChatGPT در چند مرحله آموزش داده می‌شود:

پیش‌آموزش (Pre-training) روی حجم زیادی از داده‌های متنی اینترنت
تنظیم دقیق (Fine-tuning) برای بهبود عملکرد
یادگیری تقویتی از بازخورد انسانی (RLHF)

// دسته‌بندی
function setCategory(cat){
currentCategory = cat;
render(getFiltered());
}

// فیلتر ترکیبی
function getFiltered(){
return data.filter(item=>{
return currentCategory === "all" || item.category === currentCategory;
});
}

// render
function render(list){
  const gallery = document.getElementById("gallery");
  gallery.innerHTML = "";

  list.forEach((item, i) => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${item.image}">
      <div class="card-title">${item.title}</div>
    `;

    card.onclick = () => openModal(item);

    gallery.appendChild(card);
  });
}
render(data);

// modal
function openModal(item){
  document.getElementById("modal").style.display="flex";
  document.getElementById("modalImage").src=item.image;
  document.getElementById("modalPrompt").innerText=item.prompt;
  window.currentPrompt=item.prompt;
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

function copyPrompt(){
navigator.clipboard.writeText(window.currentPrompt);
alert("کپی شد");
}

// search
document.getElementById("search").addEventListener("input",function(e){
let v=e.target.value.toLowerCase();

let filtered = data.filter(item =>
item.title.toLowerCase().includes(v) &&
(currentCategory === "all" || item.category === currentCategory)
);

render(filtered);
});
