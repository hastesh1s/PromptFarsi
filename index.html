<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>پرامپت فارسی | مرجع پرامپت هوش مصنوعی، ChatGPT و Midjourney</title>

<meta name="description" content="بهترین و کامل‌ترین آرشیو پرامپت‌های فارسی برای ChatGPT، Gemini، Claude، Midjourney، Flux و سایر ابزارهای هوش مصنوعی.">
<meta name="keywords" content="پرامپت فارسی, پرامپت هوش مصنوعی, ChatGPT, Midjourney, Gemini, Claude, Flux, PromptFarsi">
<meta name="robots" content="index,follow">
<meta name="theme-color" content="#050505">

<meta property="og:title" content="پرامپت فارسی | مرجع هوش مصنوعی">
<meta property="og:description" content="آرشیو حرفه‌ای پرامپت‌های فارسی برای ابزارهای هوش مصنوعی">
<meta property="og:type" content="website">
<meta property="og:image" content="https://i.imgur.com/R6qSBHK.jpeg">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="favicon.png">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Vazirmatn',sans-serif;
}

body{
background:#050505;
color:white;
padding:20px;
}

.header{
text-align:center;
margin-bottom:20px;
}

.logo{
font-size:3rem;
font-weight:900;
background:linear-gradient(135deg,#fff,#aaa);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.header p{
color:#aaa;
}

.categories{
display:flex;
gap:10px;
justify-content:center;
flex-wrap:wrap;
margin:15px 0;
}

.categories button{
padding:8px 12px;
border:none;
border-radius:10px;
background:#222;
color:white;
cursor:pointer;
transition:0.2s;
}

.categories button:hover{
background:#333;
}

.categories button.active{
background:#4F6EF7;
color:white;
}

.search-box{
max-width:500px;
margin:10px auto 20px;
}

.search-box input{
width:100%;
padding:12px;
border-radius:12px;
border:1px solid #333;
background:#111;
color:white;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
}

.card{
background:#0f0f0f;
border:1px solid #222;
border-radius:16px;
overflow:hidden;
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:translateY(-6px);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card-title{
padding:10px;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.85);
display:none;
justify-content:center;
align-items:center;
padding:20px;
z-index:999;
}

.modal.open{
display:flex;
}

.modal-content{
background:#111;
width:100%;
max-width:700px;
border-radius:18px;
display:flex;
flex-direction:column;
max-height:90vh;
overflow:hidden;
}

.modal-content img{
width:100%;
max-height:300px;
object-fit:cover;
}

.prompt{
padding:15px;
white-space:pre-wrap;
overflow-y:auto;
max-height:55vh;
line-height:1.7;
}

.actions{
display:flex;
gap:10px;
padding:10px;
position:sticky;
bottom:0;
background:#111;
}

button{
flex:1;
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
background:#222;
color:white;
}

button:hover{
background:#333;
}

.close{
text-align:center;
padding:12px;
background:#1a1a1a;
cursor:pointer;
}

</style>
</head>

<body>

<div class="header">
<h1 class="logo">پرامپت فارسی</h1>
<p>مرجع پرامپت هوش مصنوعی</p>
</div>

<div class="categories">
<button class="active" onclick="setCategory('all', this)">همه</button>
<button onclick="setCategory('image', this)">پرامپت عکس</button>
<button onclick="setCategory('article', this)">مقالات</button>
</div>

<div class="search-box">
<input type="text" id="search" placeholder="جستجو...">
</div>

<div class="gallery" id="gallery"></div>

<div class="modal" id="modal">
<div class="modal-content">
<img id="modalImage" alt="">
<div class="prompt" id="modalPrompt"></div>
<div class="actions">
<button onclick="copyPrompt()">📋 کپی</button>
</div>
<div class="close" onclick="closeModal()">بستن</div>
</div>
</div>

<script>

let currentCategory = "all";

let data = [
{
image:"https://i.imgur.com/R6qSBHK.jpeg",
title:"عکس واقع‌گرایانه",
category:"image",
prompt:`A low-angle close-up selfie captured outdoors under strong natural sunlight. The subject looks directly into the camera with a candid and authentic expression. Bright sunlight creates realistic shadows across the face while preserving skin texture, pores, subtle imperfections, and natural highlights. The background contains blue sky, ocean, coastline, or open natural scenery softly visible behind the subject. Captured with a modern smartphone using a wide-angle lens. Ultra-photorealistic photography. Natural color science. Realistic skin response to sunlight. Sharp focus. Authentic environmental lighting. No beauty filters. No skin smoothing. No CGI appearance. No AI-generated artifacts. The overall mood is vibrant, energetic, spontaneous, confident, and vacation-oriented`
},
{
image:"https://i.imgur.com/zOvNCFY.jpeg",
title:"پوستر فوتبالی",
category:"image",
prompt:`@PLAYER = "[Farshad Farahani]"
@CLUB = "[Real Madrid]" @NUMBER = "[7]"
OPTIONAL: @POSITION = "[Winger]" @HEADLINE = "[Legacy Never Ends]"
@LEAGUE = "[UEFA Champions League]" 3:4 Aspect Ratio is a MUST!

Create an ultra-premium cinematic CLUB FOOTBALL editorial poster in vertical 3:4 aspect ratio.`
},
{
image:"https://i.imgur.com/ixKEmFB.png",
title:"chatgpt.",
category:"article",
prompt:`هوش مصنوعی محاوره‌ای نسل جدید - ChatGPT`
},
{
image:"https://i.imgur.com/t4R1aCW.png",
title:"پرتره هنری ایرانی",
category:"image",
prompt:`Create a minimalist double exposure travel poster for me.`
},
];

function setCategory(cat, btn){
  currentCategory = cat;
  document.querySelectorAll('.categories button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render(getFiltered());
}

function getFiltered(){
  const searchVal = document.getElementById("search").value.toLowerCase();
  return data.filter(item =>
    (currentCategory === "all" || item.category === currentCategory) &&
    item.title.toLowerCase().includes(searchVal)
  );
}

function render(list){
  const gallery = document.getElementById("gallery");
  gallery.innerHTML = "";
  list.forEach(item => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <img src="${item.image}" alt="${item.title}">
      <div class="card-title">${item.title}</div>
    `;
    card.onclick = () => openModal(item);
    gallery.appendChild(card);
  });
}

render(data);

function openModal(item){
  document.getElementById("modal").classList.add("open");
  document.getElementById("modalImage").src = item.image;
  document.getElementById("modalImage").alt = item.title;
  document.getElementById("modalPrompt").innerText = item.prompt;
  window.currentPrompt = item.prompt;
}

function closeModal(){
  document.getElementById("modal").classList.remove("open");
}

document.getElementById("modal").addEventListener("click", function(e){
  if(e.target === this) closeModal();
});

document.addEventListener("keydown", function(e){
  if(e.key === "Escape") closeModal();
});

function copyPrompt(){
  navigator.clipboard.writeText(window.currentPrompt);
  alert("کپی شد");
}

document.getElementById("search").addEventListener("input", function(){
  render(getFiltered());
});

</script>

</body>
</html>
