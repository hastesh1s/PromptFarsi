<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>پرامپت فارسی</title>

<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Vazirmatn',sans-serif;
}

body{
background:#050505;
color:white;
padding:20px;
}

/* HEADER */
.header{
text-align:center;
margin-bottom:20px;
}

.logo{
font-size:3rem;
font-weight:900;
background:linear-gradient(135deg,#fff,#aaa);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.header p{
color:#aaa;
}

/* CATEGORIES */
.categories{
display:flex;
gap:10px;
justify-content:center;
flex-wrap:wrap;
margin:15px 0;
}

.categories button{
padding:8px 12px;
border:none;
border-radius:10px;
background:#222;
color:white;
cursor:pointer;
}

.categories button:hover{
background:#333;
}

/* SEARCH */
.search-box{
max-width:500px;
margin:10px auto 20px;
}

.search-box input{
width:100%;
padding:12px;
border-radius:12px;
border:1px solid #333;
background:#111;
color:white;
}

/* GRID */
.gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
}

.card{
background:#0f0f0f;
border:1px solid #222;
border-radius:16px;
overflow:hidden;
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:translateY(-6px);
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card-title{
padding:10px;
}

/* MODAL */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.85);
display:none;
justify-content:center;
align-items:center;
padding:20px;
z-index:999;
}

.modal-content{
background:#111;
width:100%;
max-width:700px;
border-radius:18px;
display:flex;
flex-direction:column;
max-height:90vh;
overflow:hidden;
}

.modal-content img{
width:100%;
max-height:300px;
object-fit:cover;
}

.prompt{
padding:15px;
white-space:pre-wrap;
overflow-y:auto;
max-height:55vh;
line-height:1.7;
}

.actions{
display:flex;
gap:10px;
padding:10px;
position:sticky;
bottom:0;
background:#111;
}

button{
flex:1;
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
background:#222;
color:white;
}

button:hover{
background:#333;
}

.close{
text-align:center;
padding:12px;
background:#1a1a1a;
cursor:pointer;
}

</style>
</head>

<body>

<div class="header">
<h1 class="logo">پرامپت فارسی</h1>
<p>مرجع پرامپت هوش مصنوعی</p>
</div>

<!-- دسته‌بندی -->
<div class="categories">
<button onclick="setCategory('all')">همه</button>
<button onclick="setCategory('image')">پرامپت عکس</button>
<button onclick="setCategory('article')">مقالات</button>
</div>

<div class="search-box">
<input type="text" id="search" placeholder="جستجو...">
</div>

<div class="gallery" id="gallery"></div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<img id="modalImage">
<div class="prompt" id="modalPrompt"></div>

<div class="actions">
<button onclick="copyPrompt()">📋 کپی</button>
</div>

<div class="close" onclick="closeModal()">بستن</div>
</div>
</div>

<script>

let currentCategory = "all";

let data = [
{
image:"https://i.imgur.com/R6qSBHK.jpeg",
title:"عکس واقع‌گرایانه",
category:"image",
prompt:"پرامپت عکس واقعی ..."
},
{
image:"https://i.imgur.com/zOvNCFY.jpeg",
title:"پوستر فوتبالی",
category:"football",
prompt:"پرامپت فوتبال ..."
},
{
image:"https://i.imgur.com/R6qSBHK.jpeg",
title:"مقاله هوش مصنوعی",
category:"article",
prompt:"این یک مقاله درباره هوش مصنوعی است ..."
}
];

// دسته‌بندی
function setCategory(cat){
currentCategory = cat;
render(getFiltered());
}

// فیلتر ترکیبی
function getFiltered(){
return data.filter(item=>{
return currentCategory === "all" || item.category === currentCategory;
});
}

// render
function render(list){
const gallery=document.getElementById("gallery");
gallery.innerHTML="";

list.forEach((item,i)=>{
gallery.innerHTML+=`
<div class="card" onclick="openModal(${i})">
<img src="${item.image}">
<div class="card-title">${item.title}</div>
</div>`;
});
}

render(data);

// modal
function openModal(i){
document.getElementById("modal").style.display="flex";
document.getElementById("modalImage").src=data[i].image;
document.getElementById("modalPrompt").innerText=data[i].prompt;
window.currentPrompt=data[i].prompt;
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

function copyPrompt(){
navigator.clipboard.writeText(window.currentPrompt);
alert("کپی شد");
}

// search
document.getElementById("search").addEventListener("input",function(e){
let v=e.target.value.toLowerCase();

let filtered = data.filter(item =>
item.title.toLowerCase().includes(v) &&
(currentCategory === "all" || item.category === currentCategory)
);

render(filtered);
});

</script>

</body>
</html>
