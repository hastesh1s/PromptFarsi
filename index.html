<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>پرامپت فارسی | مرجع پرامپت هوش مصنوعی، ChatGPT و Midjourney</title>

<meta name="description" content="بهترین و کامل‌ترین آرشیو پرامپت‌های فارسی برای ChatGPT، Gemini، Claude، Midjourney، Flux و سایر ابزارهای هوش مصنوعی.">
<meta name="keywords" content="پرامپت فارسی, پرامپت هوش مصنوعی, ChatGPT, Midjourney, Gemini, Claude, Flux, PromptFarsi">
<meta name="robots" content="index,follow">
<meta name="theme-color" content="#050505">

<meta property="og:title" content="پرامپت فارسی | مرجع هوش مصنوعی">
<meta property="og:description" content="آرشیو حرفه‌ای پرامپت‌های فارسی برای ابزارهای هوش مصنوعی">
<meta property="og:type" content="website">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700;900&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Vazirmatn',sans-serif;
}

body{
background:#050505;
color:white;
padding:20px;
}

/* HEADER */
.header{
text-align:center;
margin-bottom:35px;
}

.logo{
font-size:3.4rem;
font-weight:900;
background:linear-gradient(135deg,#fff,#aaa);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
text-shadow:0 0 30px rgba(255,255,255,0.1);
}

.header p{
color:#aaa;
margin-top:8px;
font-size:14px;
}

/* SEARCH */
.search-box{
margin:20px auto;
max-width:500px;
display:flex;
}

.search-box input{
width:100%;
padding:12px;
border-radius:12px;
border:1px solid #333;
background:#111;
color:white;
outline:none;
}

/* GRID */
.gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
margin-top:25px;
}

.card{
background:#0f0f0f;
border:1px solid #222;
border-radius:16px;
overflow:hidden;
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:translateY(-6px);
border-color:#555;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card-title{
padding:12px;
font-size:14px;
color:#ddd;
}

/* MODAL */
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.85);
display:none;
justify-content:center;
align-items:center;
padding:20px;
z-index:999;
}

.modal-content{
background:#111;
width:100%;
max-width:700px;
border-radius:18px;
overflow:hidden;
}

.modal-content img{
width:100%;
max-height:400px;
object-fit:cover;
}

.prompt{
padding:15px;
white-space:pre-wrap;
line-height:1.7;
color:#ddd;
}

.actions{
display:flex;
gap:10px;
padding:10px;
}

button{
flex:1;
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
background:#222;
color:white;
transition:0.3s;
}

button:hover{
background:#333;
}

.close{
text-align:center;
padding:12px;
background:#1a1a1a;
cursor:pointer;
}

.close:hover{
background:#2a2a2a;
}

</style>
</head>

<body>

<div class="header">
<h1 class="logo">پرامپت فارسی</h1>
<p>مرجع حرفه‌ای پرامپت‌های هوش مصنوعی</p>
</div>

<div class="search-box">
<input type="text" id="search" placeholder="جستجوی پرامپت...">
</div>

<div class="gallery" id="gallery"></div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">
<img id="modalImage">
<div class="prompt" id="modalPrompt"></div>

<div class="actions">
<button onclick="copyPrompt()">📋 کپی پرامپت</button>
</div>

<div class="close" onclick="closeModal()">بستن</div>
</div>
</div>

<script>

let data = [
{
image:"https://i.imgur.com/R6qSBHK.jpeg",
title:"واقع گرایانه",
prompt:`A low-angle close-up selfie captured outdoors under strong natural sunlight.
The subject looks directly into the camera with a candid and authentic expression.
Bright sunlight creates realistic shadows across the face while preserving skin texture, pores, subtle imperfections, and natural highlights.
The background contains blue sky, ocean, coastline, or open natural scenery softly visible behind the subject.
Captured with a modern smartphone using a wide-angle lens. Ultra-photorealistic photography. Natural color science. Realistic skin response to sunlight.
Sharp focus. Authentic environmental lighting. No beauty filters.
No skin smoothing. No CGI appearance. No AI-generated artifacts.
The overall mood is vibrant, energetic, spontaneous, confident, and vacation-oriented.`
},
];

let currentPrompt="";

// render
function render(list){
const gallery=document.getElementById("gallery");
gallery.innerHTML="";

list.forEach((item,index)=>{
gallery.innerHTML+=`
<div class="card" onclick="openModal(${index})">
<img src="${item.image}">
<div class="card-title">${item.title}</div>
</div>`;
});
}

render(data);

// modal
function openModal(i){
document.getElementById("modal").style.display="flex";
document.getElementById("modalImage").src=data[i].image;
document.getElementById("modalPrompt").innerText=data[i].prompt;
currentPrompt=data[i].prompt;
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

// copy
function copyPrompt(){
navigator.clipboard.writeText(currentPrompt);
alert("کپی شد ✅");
}

// search
document.getElementById("search").addEventListener("input",function(e){
let value=e.target.value.toLowerCase();
let filtered=data.filter(item=>item.title.toLowerCase().includes(value));
render(filtered);
});

</script>

</body>
</html>
