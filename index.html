<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prompt Gallery</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Prompt Gallery</h1>
  <p>Daily AI Image Prompts</p>
</header>

<div class="container">

  <aside class="sidebar">
    <h3>Categories</h3>

    <ul>
      <li>Fantasy</li>
      <li>Anime</li>
      <li>3D Art</li>
      <li>Cyberpunk</li>
    </ul>
  </aside>

  <main class="grid">

    <div class="card">
      <img src="https://picsum.photos/300/200?1">
      <h3>Fantasy Castle</h3>

      <button onclick="copyPrompt('Fantasy Castle Prompt')">
        Copy Prompt
      </button>
    </div>

    <div class="card">
      <img src="https://picsum.photos/300/200?2">
      <h3>Cyber City</h3>

      <button onclick="copyPrompt('Cyber City Prompt')">
        Copy Prompt
      </button>
    </div>

    <div class="card">
      <img src="https://picsum.photos/300/200?3">
      <h3>Anime Girl</h3>

      <button onclick="copyPrompt('Anime Girl Prompt')">
        Copy Prompt
      </button>
    </div>

  </main>

</div>

<script src="script.js"></script>

</body>
</html>
