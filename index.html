<head>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Vazirmatn',sans-serif;
}

body{
background:#050505;
color:white;
padding:20px;
}

.header{
text-align:center;
margin-bottom:20px;
}

.logo{
font-size:3rem;
font-weight:900;
background:linear-gradient(135deg,#fff,#aaa);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.header p{
color:#aaa;
}
  
.logo-wrapper{
display:flex;
align-items:center;
justify-content:center;
gap:12px;
margin-bottom:6px;
}

.logo-img{
width:52px;
height:52px;
border-radius:12px;
}

.categories{
display:flex;
gap:10px;
justify-content:center;
flex-wrap:wrap;
margin:15px 0;
}

.categories button{
padding:8px 12px;
border:none;
border-radius:10px;
background:#222;
color:white;
cursor:pointer;
transition:0.2s;
}

.categories button:hover{
background:#333;
}

.categories button.active{
background:#4F6EF7;
color:white;
}

.search-box{
max-width:500px;
margin:10px auto 20px;
}

.search-box input{
width:100%;
padding:12px;
border-radius:12px;
border:1px solid #333;
background:#111;
color:white;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:20px;
}

.card{
background:#0f0f0f;
border:1px solid #222;
border-radius:16px;
overflow:hidden;
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:translateY(-6px);
border-color:#4F6EF7;
transition:0.3s;
}

.card{
animation:fadeUp 0.4s ease both;
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}
  
.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card-title{
padding:10px;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.85);
display:none;
justify-content:center;
align-items:center;
padding:20px;
z-index:999;
}

.modal.open{
display:flex;
}

.modal-content{
background:#111;
width:100%;
max-width:700px;
border-radius:18px;
display:flex;
flex-direction:column;
max-height:90vh;
overflow:hidden;
}

.modal-content img{
width:100%;
max-height:300px;
object-fit:cover;
}

.prompt{
padding:15px;
white-space:pre-wrap;
overflow-y:auto;
max-height:55vh;
line-height:1.7;
}

.actions{
display:flex;
gap:10px;
padding:10px;
position:sticky;
bottom:0;
background:#111;
}

button{
flex:1;
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
background:#222;
color:white;
}

button:hover{
background:#333;
}

.close{
text-align:center;
padding:12px;
background:#1a1a1a;
cursor:pointer;
}

.telegram-btn{
position:fixed;
bottom:24px;
left:24px;
width:52px;
height:52px;
border-radius:50%;
background:#229ED9;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
z-index:1000;
transition:0.3s;
text-decoration:none;
}

.telegram-btn:hover{
background:#1a8bbf;
transform:scale(1.1);
}

.telegram-btn svg{
width:28px;
height:28px;
fill:white;
}

</style>
</head>

<body>

<div class="logo-wrapper">
  <img src="favicon.png" class="logo-img" alt="لوگو">
  <h1 class="logo">پرامپت فارسی</h1>
</div>
  
<div class="categories">
  <button class="active" onclick="setCategory('all', this)">همه</button>
  <button onclick="setCategory('image', this)">پرامپت عکس</button>
  <button onclick="setCategory('article', this)">مقالات</button>
</div>

<div class="search-box">
  <input type="text" id="search" placeholder="جستجو...">
</div>

<div class="gallery" id="gallery"></div>

<div class="modal" id="modal">
  <div class="modal-content">
    <img id="modalImage" alt="">
    <div class="prompt" id="modalPrompt"></div>
    <div class="actions">
      <button onclick="copyPrompt()">📋 کپی</button>
    </div>
    <div class="close" onclick="closeModal()">بستن</div>
  </div>
</div>

<a class="telegram-btn" href="https://t.me/nasiri4440" target="_blank">
  <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12L8.32 13.617l-2.96-.924c-.643-.204-.657-.643.136-.953l11.57-4.461c.537-.194 1.006.131.828.942z"/>
  </svg>
</a>

<script>
const data = [{ title: "TEST", image: "https://i.imgur.com/R6qSBHK.jpeg", category:"image", id:"test", prompt:"test" }];
</script>

<script>

let currentCategory = "all";

function setCategory(cat, btn){
  currentCategory = cat;
  document.querySelectorAll('.categories button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render(getFiltered());
}

function getFiltered(){
  const searchVal = document.getElementById("search").value.toLowerCase();
  return data.filter(item =>
    (currentCategory === "all" || item.category === currentCategory) &&
    item.title.toLowerCase().includes(searchVal)
  );
}

function render(list){
  const gallery = document.getElementById("gallery");
  gallery.innerHTML = "";
  list.forEach((item, index) => {
    const card = document.createElement("div");
    card.className = "card";
    card.style.animationDelay = (index * 0.1) + "s";
    card.innerHTML = `
      <img src="${item.image}" alt="${item.title}">
      <div class="card-title">${item.title}</div>
    `;
    card.onclick = () => {
      window.location.href = `prompt.html?id=${item.id}`;
    };
    gallery.appendChild(card);
  });
}

function openModal(item){
  document.getElementById("modal").classList.add("open");
  document.getElementById("modalImage").src = item.image;
  document.getElementById("modalImage").alt = item.title;
  document.getElementById("modalPrompt").innerText = item.prompt;
  window.currentPrompt = item.prompt;
}

function closeModal(){
  document.getElementById("modal").classList.remove("open");
}

document.getElementById("modal").addEventListener("click", function(e){
  if(e.target === this) closeModal();
});

document.addEventListener("keydown", function(e){
  if(e.key === "Escape") closeModal();
});

function copyPrompt(){
  navigator.clipboard.writeText(window.currentPrompt);
  alert("کپی شد");
}

document.getElementById("search").addEventListener("input", function(){
  render(getFiltered());
});

document.addEventListener("DOMContentLoaded", () => {
  render(data);
});
  
</script>

</body>
</html>
